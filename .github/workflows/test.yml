name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r sdk-python/setup.py -e .
        pip install -r gateway/requirements.txt
        pip install -r mcp-server/requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 sdk-python/ gateway/ mcp-server/ --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true

    - name: Test Python SDK
      run: |
        cd sdk-python && python -m pytest -v || true

    - name: Test Gateway
      run: |
        cd gateway && python -c "from app import app; print('Gateway imports OK')"

    - name: Test MCP Server
      run: |
        cd mcp-server && python -c "from server import app; print('MCP Server imports OK')"
